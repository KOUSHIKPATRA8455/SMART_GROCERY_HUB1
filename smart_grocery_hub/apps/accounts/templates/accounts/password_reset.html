{% extends "base.html" %}

{% block title %}Reset Password — Smart Grocery Hub{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-5">
            <div class="bg-white border rounded-3 p-4 p-md-5">
                <h1 class="h4 mb-3 text-center">Forgot Password</h1>
                <p class="text-muted text-center mb-4">Enter your email and we'll send you a link to reset your password.</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-4">
                        <label class="form-label">Email Address</label>
                        <input type="email" name="email" class="form-control" required autofocus>
                    </div>
                    <button type="submit" class="btn btn-sgh-primary w-100">Send Reset Link</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
