{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}Login — Smart Grocery Hub{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-5">
            <div class="bg-white border rounded-3 p-4 p-md-5">
                <h1 class="h4 mb-4 text-center">Welcome Back</h1>

                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}

                    <div class="d-flex justify-content-between mb-3 small">
                        <a href="{% url 'accounts:password_reset' %}">Forgot password?</a>
                    </div>

                    <button type="submit" class="btn btn-sgh-primary w-100">Log In</button>
                </form>

                <p class="text-center text-muted small mt-4 mb-0">
                    New here? <a href="{% url 'accounts:register' %}">Create an account</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
