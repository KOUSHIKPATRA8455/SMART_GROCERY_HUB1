{% extends "base.html" %}

{% block title %}Delete Address — Smart Grocery Hub{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-5">
            <div class="bg-white border rounded-3 p-4 text-center">
                <i class="fa-solid fa-triangle-exclamation text-warning fa-2x mb-3"></i>
                <h1 class="h5 mb-3">Delete this address?</h1>
                <p class="text-muted">{{ address.full_name }}, {{ address.city }}, {{ address.state }} - {{ address.pincode }}</p>
                <form method="post" class="d-flex gap-2 justify-content-center">
                    {% csrf_token %}
                    <a href="{% url 'accounts:address_list' %}" class="btn btn-outline-sgh">Cancel</a>
                    <button type="submit" class="btn btn-danger">Delete</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
