{% extends "base.html" %}

{% block title %}Check Your Email — Smart Grocery Hub{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-5">
            <div class="bg-white border rounded-3 p-4 p-md-5 text-center">
                <i class="fa-solid fa-envelope-circle-check text-success fa-2x mb-3"></i>
                <h1 class="h4 mb-3">Check Your Email</h1>
                <p class="text-muted mb-0">If an account exists with that email, we've sent a link to reset your password. (In development, the email prints to the server console.)</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
