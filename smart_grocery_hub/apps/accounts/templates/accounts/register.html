{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}Sign Up — Smart Grocery Hub{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-5">
            <div class="bg-white border rounded-3 p-4 p-md-5">
                <h1 class="h4 mb-4 text-center">Create Your Account</h1>

                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <button type="submit" class="btn btn-sgh-primary w-100 mt-3">Create Account</button>
                </form>

                <p class="text-center text-muted small mt-4 mb-0">
                    Already have an account? <a href="{% url 'accounts:login' %}">Log in</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
